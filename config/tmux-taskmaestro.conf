# ============================================
# TaskMaestro — tmux 권장 설정
# ============================================
# 이 파일은 TaskMaestro install.sh에 의해 설치됩니다.
# 수정 후 `tmux source-file ~/.tmux-taskmaestro.conf` 로 반영하세요.

# ── 기본 동작 ──
set -g mouse on
setw -g mode-keys vi
set -g history-limit 100000
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set-option -g allow-rename off

# ── 패널 이동 (Alt+방향키) ──
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# ── 윈도우 이동 (Shift+방향키) ──
bind -n S-Left previous-window
bind -n S-Right next-window

# ── 윈도우 순서 변경 (Ctrl+Shift+방향키) ──
bind-key -n C-S-Left swap-window -t -1
bind-key -n C-S-Right swap-window -t +1

# ── 레이아웃 & 패널 ──
bind = select-layout tiled
set -g display-panes-time 2000

# 패널 동기화 토글 (prefix+S)
bind S setw synchronize-panes

# 패널 타이틀 토글 (prefix+T)
# pane-border-status를 off↔top으로 전환 (POSIX sh 호환)
bind T run 'status="#{pane-border-status}"; if [ "$status" = "off" ] || [ -z "$status" ]; then tmux setw pane-border-status top; else tmux setw pane-border-status off; fi'
# 패널 이름 변경 (prefix+t)
bind t command-prompt -p "(rename-pane)" -I "#T" "select-pane -T '%%'"

# ── 상태바 ──
set -g status-bg '#1a1b26'
set -g status-fg '#a9b1d6'
set -g status-left '#[fg=#7aa2f7,bold] #S '
set -g status-right '#[fg=#565f89] %H:%M '
set -g status-left-length 30
set -g status-interval 5
